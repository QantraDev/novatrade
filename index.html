<!DOCTYPE html>
<html>
<head>
<title>Trox Trade</title>
<script src="https://s3.tradingview.com/tv.js"></script>
<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

#chart{
width:80%;
height:500px;
margin:auto;
}

button{
padding:15px 30px;
font-size:18px;
margin:10px;
border:none;
cursor:pointer;
}

.buy{
background:green;
color:white;
}

.sell{
background:red;
color:white;
}
</style>
</head>

<body>

<h1>Trox Trade Demo</h1>
<h2>Balance: $10000</h2>

<div id="chart"></div>

<button class="buy" onclick="buy()">BUY</button>
<button class="sell" onclick="sell()">SELL</button>

<script>
new TradingView.widget({
"container_id": "chart",
"width": "100%",
"height": 500,
"symbol": "BINANCE:BTCUSDT",
"interval": "1",
"theme": "dark",
"style": "1",
"locale": "en"
});

function buy(){
alert("Buy order placed");
}

function sell(){
alert("Sell order placed");
}
</script>

</body>
</html>
