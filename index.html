<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaTrade</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b1020;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#050a1c;
border-bottom:1px solid #1f2937;
}

.logo{
font-size:24px;
font-weight:bold;
color:#22c55e;
}

.balance{
font-size:18px;
}

/* LAYOUT */

.container{
display:flex;
height:calc(100vh - 60px);
}

/* CHART */

.chart-section{
flex:3;
padding:20px;
}

#chart{
height:100%;
}

/* TRADE PANEL */

.trade-panel{
flex:1;
background:#050a1c;
border-left:1px solid #1f2937;
padding:20px;
display:flex;
flex-direction:column;
}

.trade-panel h2{
margin-bottom:20px;
}

.input{
width:100%;
padding:12px;
margin-bottom:15px;
font-size:18px;
background:#0b1020;
border:1px solid #1f2937;
color:white;
}

/* BUTTONS */

.btn{
padding:15px;
font-size:18px;
border:none;
cursor:pointer;
margin-bottom:10px;
}

.buy{
background:#16a34a;
color:white;
}

.sell{
background:#dc2626;
color:white;
}

/* HISTORY */

.history{
margin-top:30px;
flex:1;
overflow:auto;
}

.history-item{
padding:10px;
border-bottom:1px solid #1f2937;
font-size:14px;
}

.green{
color:#22c55e;
}

.red{
color:#ef4444;
}

/* SYMBOL SELECT */

.symbols{
margin-bottom:15px;
padding:10px;
width:100%;
background:#0b1020;
color:white;
border:1px solid #1f2937;
}

</style>
</head>

<body>

<header>

<div class="logo">NovaTrade</div>

<div class="balance">
Balance: $<span id="balance">10000</span>
</div>

</header>

<div class="container">

<!-- CHART -->

<div class="chart-section">

<select class="symbols" id="symbolSelect" onchange="changeSymbol()">

<option value="BINANCE:BTCUSDT">BTC / USDT</option>
<option value="BINANCE:ETHUSDT">ETH / USDT</option>
<option value="BINANCE:SOLUSDT">SOL / USDT</option>
<option value="BINANCE:BNBUSDT">BNB / USDT</option>

</select>

<div id="chart"></div>

</div>

<!-- TRADE PANEL -->

<div class="trade-panel">

<h2>Trade</h2>

<input class="input" id="amount" type="number" value="100">

<button class="btn buy" onclick="buyTrade()">BUY</button>

<button class="btn sell" onclick="sellTrade()">SELL</button>

<div class="history" id="history">

<h3>Trade History</h3>

</div>

</div>

</div>

<script>

let balance = 10000
let widget

function loadChart(symbol){

document.getElementById("chart").innerHTML=""

widget = new TradingView.widget({

container_id:"chart",
width:"100%",
height:"100%",
symbol:symbol,
interval:"1",
timezone:"Etc/UTC",
theme:"dark",
style:"1",
locale:"en",
toolbar_bg:"#0b1020",
enable_publishing:false,
allow_symbol_change:true

})

}

loadChart("BINANCE:BTCUSDT")

function changeSymbol(){

let symbol = document.getElementById("symbolSelect").value

loadChart(symbol)

}

function buyTrade(){

let amount = Number(document.getElementById("amount").value)

if(amount>balance){

alert("Not enough balance")

return

}

balance -= amount

updateBalance()

addHistory("BUY",amount)

}

function sellTrade(){

let amount = Number(document.getElementById("amount").value)

balance += amount

updateBalance()

addHistory("SELL",amount)

}

function updateBalance(){

document.getElementById("balance").innerText = balance.toFixed(2)

}

function addHistory(type,amount){

let history = document.getElementById("history")

let item = document.createElement("div")

item.className="history-item"

let color = type=="BUY" ? "green" : "red"

item.innerHTML = `<span class="${color}">${type}</span> $${amount}`

history.appendChild(item)

}

</script>

</body>
</html>
