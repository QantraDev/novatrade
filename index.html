<!DOCTYPE html>
<html>
<head>
<title>NovaTrade</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

#chart{
width:90%;
height:500px;
margin:auto;
}

button{
padding:12px 25px;
font-size:16px;
margin:8px;
border:none;
cursor:pointer;
}

.buy{background:green;color:white;}
.sell{background:red;color:white;}
.deposit{background:#2563eb;color:white;}
.withdraw{background:#f59e0b;color:white;}

input{
padding:10px;
margin:5px;
}
</style>
</head>

<body>

<div id="login">

<h2>NovaTrade Login</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

</div>

<div id="app" style="display:none;">

<h1>NovaTrade</h1>
<h2 id="balance">Balance: $10000</h2>

<div id="chart"></div>

<button class="buy" onclick="buy()">BUY</button>
<button class="sell" onclick="sell()">SELL</button>

<br>

<button class="deposit" onclick="deposit()">Deposit</button>
<button class="withdraw" onclick="withdraw()">Withdraw</button>

</div>

<script>

let balance = 10000

function register(){
let u = document.getElementById("user").value
let p = document.getElementById("pass").value

localStorage.setItem("user",u)
localStorage.setItem("pass",p)

alert("Account created")
}

function login(){

let u = document.getElementById("user").value
let p = document.getElementById("pass").value

if(u==localStorage.getItem("user") && p==localStorage.getItem("pass")){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

loadChart()

}else{

alert("Wrong login")

}

}

function loadChart(){

new TradingView.widget({
"container_id": "chart",
"width": "100%",
"height": 500,
"symbol": "BINANCE:BTCUSDT",
"interval": "1",
"theme": "dark"
})

}

function updateBalance(){
document.getElementById("balance").innerText="Balance: $"+balance
}

function buy(){
balance -= 100
updateBalance()
alert("Buy order executed")
}

function sell(){
balance += 100
updateBalance()
alert("Sell order executed")
}

function deposit(){
balance += 500
updateBalance()
alert("Deposit successful")
}

function withdraw(){
balance -= 500
updateBalance()
alert("Withdraw successful")
}

</script>

</body>
</html>
