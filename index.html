<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaTrade</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1020;
color:white;
}

/* HEADER */

header{

display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#050a1c;
border-bottom:1px solid #1f2937;

}

.logo{

font-size:26px;
font-weight:bold;
color:#22c55e;

}

.balance{

font-size:18px;

}

/* MAIN */

.main{

display:flex;
height:calc(100vh - 70px);

}

/* CHART */

.chart-area{

flex:3;
padding:15px;

}

#chart{

height:100%;

}

/* PANEL */

.panel{

flex:1;
background:#050a1c;
border-left:1px solid #1f2937;
padding:20px;
display:flex;
flex-direction:column;

}

.panel h2{

margin-bottom:20px;

}

/* INPUT */

.input{

width:100%;
padding:12px;
font-size:18px;
background:#0b1020;
border:1px solid #1f2937;
color:white;
margin-bottom:15px;

}

/* BUTTONS */

.btn{

padding:15px;
font-size:18px;
border:none;
cursor:pointer;
margin-bottom:10px;

}

.buy{

background:#16a34a;

}

.sell{

background:#dc2626;

}

/* HISTORY */

.history{

margin-top:25px;
flex:1;
overflow:auto;

}

.history-item{

padding:10px;
border-bottom:1px solid #1f2937;

}

.green{

color:#22c55e;

}

.red{

color:#ef4444;

}

/* SYMBOL */

.symbol-select{

width:100%;
padding:10px;
margin-bottom:15px;
background:#0b1020;
border:1px solid #1f2937;
color:white;

}

/* TIME */

.time{

margin-top:15px;
font-size:14px;
color:#9ca3af;

}

</style>

</head>

<body>

<header>

<div class="logo">NovaTrade</div>

<div>

Balance: $<span id="balance">10000</span>

</div>

</header>

<div class="main">

<!-- CHART -->

<div class="chart-area">

<select id="symbol" class="symbol-select" onchange="changeSymbol()">

<option value="BINANCE:BTCUSDT">BTC / USDT</option>
<option value="BINANCE:ETHUSDT">ETH / USDT</option>
<option value="BINANCE:SOLUSDT">SOL / USDT</option>
<option value="BINANCE:BNBUSDT">BNB / USDT</option>

</select>

<div id="chart"></div>

</div>

<!-- TRADE PANEL -->

<div class="panel">

<h2>Trade</h2>

<input type="number" id="amount" class="input" value="100">

<button class="btn buy" onclick="buy()">BUY</button>

<button class="btn sell" onclick="sell()">SELL</button>

<div class="time" id="time"></div>

<div class="history" id="history">

<h3>Trade History</h3>

</div>

</div>

</div>

<script>

let balance = 10000
let widget

function loadChart(symbol){

document.getElementById("chart").innerHTML=""

widget = new TradingView.widget({

container_id:"chart",
width:"100%",
height:"100%",
symbol:symbol,
interval:"1",
timezone:"Etc/UTC",
theme:"dark",
style:"1",
locale:"en",
toolbar_bg:"#0b1020",
enable_publishing:false,
allow_symbol_change:true

})

}

loadChart("BINANCE:BTCUSDT")

function changeSymbol(){

let s = document.getElementById("symbol").value

loadChart(s)

}

/* BUY */

function buy(){

let amount = Number(document.getElementById("amount").value)

if(amount > balance){

alert("Balance not enough")

return

}

balance -= amount

updateBalance()

addHistory("BUY",amount)

}

/* SELL */

function sell(){

let amount = Number(document.getElementById("amount").value)

balance += amount

updateBalance()

addHistory("SELL",amount)

}

/* BALANCE */

function updateBalance(){

document.getElementById("balance").innerText = balance.toFixed(2)

}

/* HISTORY */

function addHistory(type,amount){

let history = document.getElementById("history")

let div = document.createElement("div")

div.className="history-item"

let color = type=="BUY" ? "green" : "red"

div.innerHTML = `<span class="${color}">${type}</span> $${amount}`

history.appendChild(div)

}

/* CLOCK */

function updateTime(){

let now = new Date()

document.getElementById("time").innerText =
"Server Time: " + now.toLocaleTimeString()

}

setInterval(updateTime,1000)

</script>

</body>

</html>
