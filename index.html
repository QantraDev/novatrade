<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaTrade</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #1e293b;
}

.logo{
font-size:20px;
font-weight:bold;
color:#38bdf8;
}

.balance{
background:#1e293b;
padding:8px 14px;
border-radius:6px;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

.chart-area{
flex:3;
}

.trade-panel{
flex:1;
background:#020617;
padding:20px;
border-left:1px solid #1e293b;
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
}

input,select{
width:100%;
padding:10px;
border:none;
border-radius:6px;
background:#1e293b;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:15px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
}

.buy{
background:#16a34a;
}

.sell{
background:#dc2626;
}

.history{
margin-top:20px;
font-size:14px;
}

.trade-item{
background:#1e293b;
padding:8px;
margin-top:5px;
border-radius:5px;
}

@media (max-width:900px){

.container{
flex-direction:column;
height:auto;
}

.chart-area{
height:60vh;
}

.trade-panel{
width:100%;
}

}

</style>
</head>

<body>

<header>

<div class="logo">NovaTrade</div>

<div class="balance">
Balance: $<span id="balance">1000</span>
</div>

</header>

<div class="container">

<div class="chart-area">

<div id="tradingview_chart" style="height:100%;"></div>

</div>

<div class="trade-panel">

<label>Asset</label>

<select id="asset">
<option>BTCUSDT</option>
<option>ETHUSDT</option>
<option>EURUSD</option>
<option>GBPUSD</option>
</select>

<label>Amount ($)</label>

<input type="number" id="amount" value="10">

<label>Time</label>

<select id="time">
<option value="5">5 sec</option>
<option value="10">10 sec</option>
<option value="30">30 sec</option>
<option value="60">1 min</option>
</select>

<button class="buy" onclick="trade('buy')">
BUY ↑
</button>

<button class="sell" onclick="trade('sell')">
SELL ↓
</button>

<div class="history" id="history">

Trade History

</div>

</div>

</div>

<script>

new TradingView.widget({
"width": "100%",
"height": "100%",
"symbol": "BINANCE:BTCUSDT",
"interval": "1",
"timezone": "Etc/UTC",
"theme": "dark",
"style": "1",
"locale": "en",
"toolbar_bg": "#0f172a",
"container_id": "tradingview_chart"
});

let balance = 1000;

function trade(type){

let amount = parseFloat(document.getElementById("amount").value);
let time = document.getElementById("time").value;

if(amount > balance){
alert("Not enough balance");
return;
}

balance -= amount;

document.getElementById("balance").innerText = balance;

let item = document.createElement("div");
item.className="trade-item";

item.innerText = type.toUpperCase()+" $"+amount+" ("+time+"s)";

document.getElementById("history").appendChild(item);

setTimeout(()=>{

let win = Math.random() > 0.5;

if(win){

let profit = amount * 1.8;

balance += profit;

alert("WIN +$"+profit);

}else{

alert("LOSE -$"+amount);

}

document.getElementById("balance").innerText = balance;

}, time*1000);

}

</script>

</body>
</html>
