<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaTrade Demo</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
background:#0f172a;
color:white;
font-family:Arial;
}

header{
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
color:#22c55e;
}

.balance{
font-size:18px;
}

.container{
display:flex;
height:90vh;
}

.chart-area{
flex:3;
padding:10px;
}

#chart{
width:100%;
height:100%;
}

.trade-panel{
flex:1;
background:#020617;
padding:20px;
}

input{
width:100%;
padding:10px;
font-size:16px;
margin-bottom:15px;
text-align:center;
}

button{
width:100%;
padding:15px;
font-size:18px;
border:none;
margin-bottom:10px;
cursor:pointer;
}

.buy{
background:#16a34a;
color:white;
}

.sell{
background:#dc2626;
color:white;
}

.history{
margin-top:20px;
height:250px;
overflow:auto;
font-size:14px;
}

.trade-item{
padding:5px;
border-bottom:1px solid #1e293b;
}

</style>

</head>

<body>

<header>

<div class="logo">NovaTrade</div>

<div class="balance" id="balance">
Balance: $10000
</div>

</header>

<div class="container">

<div class="chart-area">
<div id="chart"></div>
</div>

<div class="trade-panel">

<h3>Trade</h3>

<input id="amount" value="100">

<button class="buy" onclick="buy()">
BUY
</button>

<button class="sell" onclick="sell()">
SELL
</button>

<h3>Trade History</h3>

<div class="history" id="history"></div>

</div>

</div>

<script>

let balance = 10000

function updateBalance(){

document.getElementById("balance").innerText =
"Balance: $" + balance

}

function addHistory(text){

let div = document.createElement("div")

div.className = "trade-item"

div.innerText = text

document.getElementById("history").prepend(div)

}

function buy(){

let amount = Number(document.getElementById("amount").value)

if(amount > balance){
alert("Not enough balance")
return
}

balance -= amount

updateBalance()

addHistory("BUY $" + amount)

}

function sell(){

let amount = Number(document.getElementById("amount").value)

balance += amount

updateBalance()

addHistory("SELL $" + amount)

}

new TradingView.widget({

container_id: "chart",

width: "100%",

height: "100%",

symbol: "BINANCE:BTCUSDT",

interval: "1",

timezone: "Etc/UTC",

theme: "dark",

style: "1",

locale: "en",

toolbar_bg: "#0f172a",

enable_publishing: false,

hide_side_toolbar: false,

allow_symbol_change: true

})

</script>

</body>

</html>
