<!DOCTYPE html>
<html>
<head>
<title>NovaTrade</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

#chart{
width:90%;
height:500px;
margin:auto;
}

button{
padding:15px 30px;
font-size:18px;
margin:10px;
border:none;
cursor:pointer;
}

.buy{
background:#16a34a;
color:white;
}

.sell{
background:#dc2626;
color:white;
}

input{
padding:10px;
font-size:16px;
margin:10px;
}

#history{
margin-top:20px;
}
</style>
</head>

<body>

<h1>NovaTrade Demo</h1>

<h2 id="balance">Balance: $10000</h2>

<div id="chart"></div>

<br>

<input id="amount" placeholder="Trade Amount $" />

<br>

<button class="buy" onclick="buy()">BUY</button>
<button class="sell" onclick="sell()">SELL</button>

<h3>Trade History</h3>
<div id="history"></div>

<script>

let balance = 10000

function updateBalance(){
document.getElementById("balance").innerHTML = "Balance: $" + balance
}

new TradingView.widget({
"container_id": "chart",
"width": "100%",
"height": 500,
"symbol": "BINANCE:BTCUSDT",
"interval": "1",
"theme": "dark",
"style": "1",
"locale": "en"
})

function buy(){

let amount = document.getElementById("amount").value

if(amount == "") return

balance -= amount

updateBalance()

document.getElementById("history").innerHTML +=
"<p>BUY $" + amount + "</p>"

}

function sell(){

let amount = document.getElementById("amount").value

if(amount == "") return

balance += amount

updateBalance()

document.getElementById("history").innerHTML +=
"<p>SELL $" + amount + "</p>"

}

</script>

</body>
</html>
